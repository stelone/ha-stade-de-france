# Forgejo Actions : crée une Release Forgejo quand un tag « v* » est poussé.
# Convention alignée sur kaz-proxy : runs-on docker + secrets.FORGEJO_TOKEN.
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Forgejo release
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          SERVER: ${{ github.server_url }}     # https://forge.home.sdalens.com
          REPO: ${{ github.repository }}       # Kaz/ha-stade-de-france
          TAG: ${{ github.ref_name }}          # v0.1.0
        run: |
          set -eu
          api="$SERVER/api/v1/repos/$REPO/releases"

          # Idempotent : ne rien faire si la release existe déjà.
          if curl -fsSL -H "Authorization: token $FORGEJO_TOKEN" \
               "$api/tags/$TAG" >/dev/null 2>&1; then
            echo "Release $TAG déjà existante — rien à faire."
            exit 0
          fi

          # Corps = message du tag annoté (sinon une ligne par défaut).
          NOTES="$(git tag -l --format='%(contents)' "$TAG")"
          [ -n "$NOTES" ] || NOTES="Release $TAG"

          # JSON encodé proprement via node (présent dans l'image des runners).
          BODY="$(TAG="$TAG" NOTES="$NOTES" node -e \
            'process.stdout.write(JSON.stringify({tag_name:process.env.TAG,name:process.env.TAG,body:process.env.NOTES}))')"

          curl -fsSL -X POST "$api" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY"
          echo "Release $TAG créée."
