# Forgejo Actions pipeline (also valid GitHub Actions syntax).
# Runs the test suite. The `ubuntu-latest` label is mapped to a container image
# by the Forgejo act_runner default configuration.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Run tests
        run: pytest -q
